<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Navigator AI</title>

    <!-- ✅ Correct CSS path for Flask -->
    <link rel="stylesheet" href="{{ url_for('static', filename='campus_navigator.css') }}">
</head>

<body>

<div class="page">
    <div class="chat-container">

        <h1>📍 Campus Navigator AI</h1>
        <p class="subtitle">
            I can help with exam halls, library hours, and office locations.
        </p>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat user">
                Where is the library?
            </div>

            <div class="chat bot">
                The library is in the North Block, Level 2.
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
    <input type="text" id="userInput" placeholder="Type here">
    <button type="button" onclick="sendMessage()">Send</button>
    <button id="gpsBtn" type="button">📍 GPS</button>
</div>

<!-- ✅ ADD SCRIPT HERE (VERY IMPORTANT) -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
